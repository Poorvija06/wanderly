<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderly | Login </title>
</head>
<body>
    <section class="login">
        <h2>Login</h2>
        <p> Enter your credentials to access your account.</p>
        <form>
            <label>Email Address</label><br>
            <input type="name" placeholder="Enter your email"><br>
            <label>Password</label><br>
            <input type="number" placeholder="Enter your password"><br>
            <a>Forgot Password?</a><br>
            <input type="checkbox">
            <label>Remember Me</label><br>
            <button>Login</button>
       </form>
       <p>Don't have an account?</p><a>Sign Up</a>
    </section>
    <h2> Welcome Back!</h2>
    <p> Login to continue your journey 
        with us and explore the world.</p>
</body>
</html>
